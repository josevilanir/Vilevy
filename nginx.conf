server {
    listen 80;
    server_name localhost;

    # Serve o build do frontend (ajuste o caminho se necessário)
    root /usr/share/nginx/html;
    index index.html;

    # Serve arquivos de upload
    location /uploads/ {
        alias /app/backend-pixel-pal/uploads/;
        autoindex off;
    }

    # Fallback SPA: qualquer rota que não existe cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
