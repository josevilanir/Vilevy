version: '3.9'

services:
  backend:
    build: ./backend-pixel-pal
    ports:
      - "4000:4000"
    volumes:
      - ./backend-pixel-pal/uploads:/app/uploads
    restart: always

  frontend:
    build: .
    ports:
      - "4173:80"
    environment:
      - VITE_API_URL=http://backend:4000
    depends_on:
      - backend
    restart: always

# Se preferir usar arquivo .env, descomente abaixo e comente a seção environment:
#
# env_file:
#   - .env
#
# onde .env define: VITE_API_URL=http://backend:4000
